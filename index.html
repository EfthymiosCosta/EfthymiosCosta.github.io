								<div class="container">
									<h2>Efthymios Costa</h2>
									<p><h4>PhD Student at Imperial College London</h4></p>
									<p>I am a research postgraduate student based at Imperial College London, currently enrolled in the <a href="https://statml.io/">Modern Statistics and Statistical Machine Learning (StatML)</a> Centre for Doctoral Training (2021 Cohort). I am under the academic supervision of <a href="https://www.imperial.ac.uk/people/i.papatsouma">Dr Ioanna Papatsouma</a> & <a href="https://www.ma.imperial.ac.uk/~ayoung/">Professor Alastair Young</a>.</p>
									<p>I am currently a visiting student at the University of Bologna, working under the supervision of <a href="https://www.unibo.it/sitoweb/christian.hennig/en">Professor Christian Martin Hennig</a>.</p>
								</div>
							</section>

						<!-- Two -->
							<section id="two">
								<div class="container">
									<h2>Research Interests</h2>
									<p>I am interested in a broad range of topics in statistics and machine learning. My research is currently centred on the confluence of unsupervised learning methodologies for mixed-type data with concepts of robustness.<br><br>
										More precisely, I am working towards the development of an outlier identification algorithm for mixed-type data.
									</p>
								</div>
							</section>
